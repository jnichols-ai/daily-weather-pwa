name: Hourly weather pull

on:
  schedule:
    # Runs at the top of every hour. GitHub may delay a few minutes under load — fine for this use case.
    - cron: "0 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab to test

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call the weather cron endpoint
        run: |
          curl -sS -X GET "${{ secrets.WEATHER_APP_URL }}/api/cron/weather" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
